name: Gooblin Benchmark Pilot

on:
  workflow_dispatch:
    inputs:
      model:
        description: GitHub Models model id
        required: false
        default: openai/gpt-4o-mini
      task_ids:
        description: Optional comma-separated task ids
        required: false
        default: ""

permissions:
  contents: read
  models: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Gooblin benchmark pilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: ${{ inputs.model }}
          TASK_IDS: ${{ inputs.task_ids }}
          MODEL_TIMEOUT_MS: 60000
        run: node scripts/run-benchmark-pilot.mjs

      - name: Upload benchmark output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gooblin-benchmark-pilot
          path: benchmark-output
